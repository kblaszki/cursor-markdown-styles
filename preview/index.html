<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown CSS Playground</title>
    <link rel="stylesheet" href="./markdown.css" />
    <style id="runtime-css"></style>
  </head>
  <body>
    <main class="page">
      <section class="preview-toolbar" aria-label="Preview controls">
        <div class="preview-toolbar__actions">
          <button id="load-css-button" type="button">Load CSS</button>
          <button id="reset-css-button" type="button">Reset CSS</button>
          <input id="css-file-input" type="file" accept=".css,text/css" hidden />
        </div>
        <p id="css-status" class="preview-toolbar__status">
          Using bundled stylesheet: <code>preview/markdown.css</code>
        </p>
      </section>

      <nav
        id="fixture-tabs"
        class="preview-tabs"
        aria-label="Example fixtures"
        role="tablist"
      ></nav>

      <p id="fixture-source" class="preview-fixture-source" hidden></p>

      <article
        id="preview-content"
        class="markdown-body anysphere-markdown-container-root"
        role="tabpanel"
        tabindex="0"
        aria-live="polite"
      ></article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
    <script src="./fixtures.js"></script>
    <script>
      (async () => {
        const FIXTURES = window.PREVIEW_FIXTURES;
        const EMBEDDED_MARKDOWN = window.PREVIEW_EMBEDDED_MARKDOWN;

        const fileInput = document.getElementById("css-file-input");
        const loadButton = document.getElementById("load-css-button");
        const resetButton = document.getElementById("reset-css-button");
        const status = document.getElementById("css-status");
        const runtimeStyle = document.getElementById("runtime-css");
        const tabsNav = document.getElementById("fixture-tabs");
        const previewContent = document.getElementById("preview-content");
        const fixtureSource = document.getElementById("fixture-source");

        const STORAGE_KEY = "markdown-preview-active-fixture";
        const renderedCache = new Map();

        marked.setOptions({
          gfm: true,
          breaks: false,
        });

        const enhanceTaskLists = (html) => {
          const template = document.createElement("template");
          template.innerHTML = html;

          template.content.querySelectorAll("li").forEach((item) => {
            const checkbox = item.querySelector(':scope > input[type="checkbox"]');
            if (!checkbox) {
              return;
            }

            item.classList.add("task-list-item");
            checkbox.classList.add("task-list-item-checkbox");
            checkbox.removeAttribute("disabled");

            const parentList = item.parentElement;
            if (parentList?.tagName === "UL") {
              parentList.classList.add("contains-task-list");
            }

            if (item.querySelector(":scope > .task-list-item-label")) {
              return;
            }

            const label = document.createElement("span");
            label.className = "task-list-item-label";
            const nestedList = item.querySelector(":scope > ul");
            const nodesToMove = [];

            let node = checkbox.nextSibling;
            while (node && node !== nestedList) {
              nodesToMove.push(node);
              node = node.nextSibling;
            }

            nodesToMove.forEach((contentNode) => {
              label.appendChild(contentNode);
            });

            if (label.childNodes.length > 0) {
              item.insertBefore(label, nestedList);
            }
          });

          return template.innerHTML;
        };

        const setStatus = (message) => {
          status.textContent = message;
        };

        const isCursorInlineTheme = (cssText) =>
          cssText.includes(".anysphere-markdown-container-root") ||
          cssText.includes(".markdown-editor-react__richtext-content");

        const applyCssFile = async (file) => {
          if (!file || !file.name.toLowerCase().endsWith(".css")) {
            setStatus("Please choose a valid .css file.");
            return;
          }

          const cssText = await file.text();
          const cursorTheme = isCursorInlineTheme(cssText);

          runtimeStyle.textContent = cssText;
          document.body.classList.toggle("preview-theme-active", cursorTheme);

          setStatus(
            cursorTheme
              ? `Loaded Cursor theme: ${file.name}`
              : `Loaded CSS override: ${file.name}`
          );
        };

        const loadFixtureMarkdown = async (file) => {
          try {
            const response = await fetch(`../examples/${file}`);
            if (response.ok) {
              return { markdown: await response.text(), source: "fetch" };
            }
          } catch {
            // file:// and other fetch failures fall back to embedded fixtures
          }

          return {
            markdown: EMBEDDED_MARKDOWN[file],
            source: "embedded",
          };
        };

        const renderFixture = async (fixture) => {
          let cached = renderedCache.get(fixture.id);

          if (!cached) {
            const { markdown, source } = await loadFixtureMarkdown(fixture.file);
            cached = {
              html: enhanceTaskLists(marked.parse(markdown)),
              source,
            };
            renderedCache.set(fixture.id, cached);
          }

          fixtureSource.hidden = cached.source !== "fetch";
          fixtureSource.textContent =
            cached.source === "fetch"
              ? `Loaded live from examples/${fixture.file}`
              : "";

          previewContent.innerHTML = cached.html;
          sessionStorage.setItem(STORAGE_KEY, fixture.id);
        };

        const activateTab = async (fixture, button) => {
          tabsNav.querySelectorAll('[role="tab"]').forEach((tab) => {
            tab.setAttribute("aria-selected", "false");
            tab.tabIndex = -1;
          });

          button.setAttribute("aria-selected", "true");
          button.tabIndex = 0;
          button.focus({ preventScroll: true });

          await renderFixture(fixture);
        };

        const initialFixtureId =
          sessionStorage.getItem(STORAGE_KEY) ?? FIXTURES[0].id;
        const initialIndex = Math.max(
          0,
          FIXTURES.findIndex((fixture) => fixture.id === initialFixtureId)
        );

        FIXTURES.forEach((fixture, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "preview-tabs__tab";
          button.id = `tab-${fixture.id}`;
          button.role = "tab";
          button.setAttribute("aria-controls", "preview-content");
          button.setAttribute(
            "aria-selected",
            index === initialIndex ? "true" : "false"
          );
          button.tabIndex = index === initialIndex ? 0 : -1;
          button.textContent = fixture.label;
          button.title = `examples/${fixture.file}`;

          button.addEventListener("click", () => {
            activateTab(fixture, button);
          });

          button.addEventListener("keydown", (event) => {
            const tabs = [...tabsNav.querySelectorAll('[role="tab"]')];
            const currentIndex = tabs.indexOf(button);
            let nextIndex = currentIndex;

            if (event.key === "ArrowRight") {
              nextIndex = (currentIndex + 1) % tabs.length;
            } else if (event.key === "ArrowLeft") {
              nextIndex = (currentIndex - 1 + tabs.length) % tabs.length;
            } else if (event.key === "Home") {
              nextIndex = 0;
            } else if (event.key === "End") {
              nextIndex = tabs.length - 1;
            } else {
              return;
            }

            event.preventDefault();
            activateTab(FIXTURES[nextIndex], tabs[nextIndex]);
          });

          tabsNav.appendChild(button);
        });

        await renderFixture(FIXTURES[initialIndex]);

        loadButton.addEventListener("click", () => {
          fileInput.click();
        });

        fileInput.addEventListener("change", async (event) => {
          const file = event.target.files?.[0];
          await applyCssFile(file);
        });

        resetButton.addEventListener("click", () => {
          runtimeStyle.textContent = "";
          fileInput.value = "";
          document.body.classList.remove("preview-theme-active");
          setStatus("Using bundled stylesheet: preview/markdown.css");
        });

        document.addEventListener("dragover", (event) => {
          if (
            [...event.dataTransfer.items].some((item) => item.kind === "file")
          ) {
            event.preventDefault();
            document.body.classList.add("is-dragging-css");
          }
        });

        document.addEventListener("dragleave", (event) => {
          if (event.target === document.documentElement) {
            document.body.classList.remove("is-dragging-css");
          }
        });

        document.addEventListener("drop", async (event) => {
          event.preventDefault();
          document.body.classList.remove("is-dragging-css");

          const cssFile = [...event.dataTransfer.files].find((file) =>
            file.name.toLowerCase().endsWith(".css")
          );

          if (!cssFile) {
            setStatus("Drop a .css file to preview it.");
            return;
          }

          await applyCssFile(cssFile);
        });
      })();
    </script>
  </body>
</html>
